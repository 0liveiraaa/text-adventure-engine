$schema: "https://json-schema.org/draft/2020-12/schema"
title: EngineConfig
type: object
additionalProperties: false
properties:
  llm:
    type: object
    additionalProperties: false
    properties:
      api_key:
        type: string
        default: ""
      model:
        type: string
        minLength: 1
        default: gpt-4
      enable_reasoning:
        type: boolean
        default: false
      temperature:
        type: number
        minimum: 0
        maximum: 2
        default: 0.7
      max_tokens:
        type: integer
        minimum: 100
        maximum: 16000
        default: 2000
      timeout:
        type: integer
        minimum: 1
        maximum: 300
        default: 30
      api_base:
        type: string
        minLength: 1
        default: https://api.openai.com/v1
    required: [api_key, model, enable_reasoning, temperature, max_tokens, timeout, api_base]

  system:
    type: object
    additionalProperties: false
    properties:
      max_retry_count:
        type: integer
        minimum: 1
        maximum: 10
        default: 3
      retry_timeout_ms:
        type: integer
        minimum: 1000
        maximum: 30000
        default: 5000
      fallback_error:
        type: string
        default: 系统繁忙，请稍后重试
      snapshot_interval:
        type: integer
        minimum: 1
        default: 10
      dexterity_attribute_keys:
        type: array
        minItems: 1
        items:
          type: string
        default: [dexterity, 敏捷]
    required: [max_retry_count, retry_timeout_ms, fallback_error, snapshot_interval, dexterity_attribute_keys]

  agent:
    type: object
    additionalProperties: false
    properties:
      dm:
        type: object
        additionalProperties: false
        properties:
          memory_turns:
            type: integer
            minimum: 1
            default: 5
        required: [memory_turns]
      npc:
        type: object
        additionalProperties: false
        properties:
          memory_turns:
            type: integer
            minimum: 1
            default: 15
          shortlog_turns:
            type: integer
            minimum: 1
            default: 30
          shortlog_merge_threshold:
            type: integer
            minimum: 1
            default: 5
          max_actions_per_turn:
            type: integer
            minimum: 1
            default: 3
          cooldown_turns:
            type: integer
            minimum: 0
            default: 1
        required: [memory_turns, shortlog_turns, shortlog_merge_threshold, max_actions_per_turn, cooldown_turns]
      narrative:
        type: object
        additionalProperties: false
        properties:
          recent_turns:
            type: integer
            minimum: 1
            default: 5
        required: [recent_turns]
    required: [dm, npc, narrative]

  storage:
    type: object
    additionalProperties: false
    properties:
      world:
        type: object
        additionalProperties: false
        properties:
          sqlite_path:
            type: string
            default: world/world_snapshots.sqlite3
        required: [sqlite_path]
      narrative:
        type: object
        additionalProperties: false
        properties:
          sqlite_path:
            type: string
            default: world/narrative_truth.sqlite3
        required: [sqlite_path]
    required: [world, narrative]

  description:
    type: object
    additionalProperties: false
    properties:
      add_interval:
        type: integer
        minimum: 1
        default: 10
      merge_threshold:
        type: integer
        minimum: 1
        default: 3
    required: [add_interval, merge_threshold]

  consistency:
    type: object
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        default: true
      trigger_interval_turns:
        type: integer
        minimum: 1
        default: 10
      description_add_threshold:
        type: integer
        minimum: 0
        default: 3
      shortlog_threshold:
        type: integer
        minimum: 0
        default: 5
      min_narration_candidates:
        type: integer
        minimum: 1
        default: 2
      include_full_config_json:
        type: boolean
        default: true
      block_on_failure:
        type: boolean
        default: true
      narration_fallback_recent_changes:
        type: integer
        minimum: 1
        default: 3
    required: [enabled, trigger_interval_turns, description_add_threshold, shortlog_threshold, min_narration_candidates, include_full_config_json, block_on_failure, narration_fallback_recent_changes]

  runtime:
    type: object
    additionalProperties: false
    properties:
      trace_id_start:
        type: integer
        minimum: 0
        default: 1000
      trace_id_step:
        type: integer
        minimum: 1
        default: 1
      turn_id_step:
        type: integer
        minimum: 1
        default: 1
      stream_chunk_size:
        type: integer
        minimum: 1
        default: 6
      stream_chunk_delay_sec:
        type: number
        minimum: 0
        default: 0.04
      engine_poll_interval_sec:
        type: number
        minimum: 0
        default: 0.05
    required: [trace_id_start, trace_id_step, turn_id_step, stream_chunk_size, stream_chunk_delay_sec, engine_poll_interval_sec]

required: [llm, system, agent, storage, description, consistency, runtime]
