llm:
  api_key: YOUR_API_KEY_HERE
  model: qwen3.6-plus #推荐
  enable_reasoning: false
  temperature: 0.7
  max_tokens: 5012
  timeout: 30
  api_base: https://dashscope.aliyuncs.com/compatible-mode/v1

system:
  max_retry_count: 3
  retry_timeout_ms: 5000
  fallback_error: 系统繁忙，请稍后重试
  snapshot_interval: 10
  dexterity_attribute_keys:
  - dexterity
  - 敏捷

agent:
  dm:
    memory_turns: 5
  npc:
    memory_turns: 15
    shortlog_turns: 30
    shortlog_merge_threshold: 5
    max_actions_per_turn: 3
    cooldown_turns: 0
  narrative:
    recent_turns: 5

storage:
  world:
    sqlite_path: world/world_snapshots.sqlite3
  narrative:
    sqlite_path: world/narrative_truth.sqlite3

description:
  add_interval: 10
  merge_threshold: 3

consistency:
  enabled: true
  trigger_interval_turns: 10
  description_add_threshold: 3
  shortlog_threshold: 5
  min_narration_candidates: 2
  include_full_config_json: true
  block_on_failure: true
  narration_fallback_recent_changes: 3

runtime:
  trace_id_start: 1000
  trace_id_step: 1
  turn_id_step: 1
  stream_chunk_size: 6
  stream_chunk_delay_sec: 0.04
  engine_poll_interval_sec: 0.05
